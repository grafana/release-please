on:
  push:
    branches:
      - main
  pull_request:
name: ci
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}
      - run: node --version
      - run: corepack enable
      # The first installation step ensures that all of our production
      # dependencies work on the given Node.js version, this helps us find
      # dependencies that don't match our engines field:
      - run: yarn workspaces focus --production
      # Clean up the production install, before installing dev/production:
      - run: rm -rf node_modules
      - run: yarn install --immutable
      - run: yarn test
        env:
          MOCHA_THROW_DEPRECATION: false
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn test
        env:
          MOCHA_THROW_DEPRECATION: false
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn lint
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn docs
      # Pinned to the commit that release v1 (1.11.0) points to, so the
      # action can't be silently re-pointed by retagging upstream.
      # See https://github.com/JustinBeckwith/linkinator-action/releases/tag/v1
      - uses: JustinBeckwith/linkinator-action@3d5ba091319fa7b0ac14703761eebb7d100e6f6d # v1 (1.11.0)
        with:
          paths: docs/
  build-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: google-github-actions/release-please-action
          ref: main
          persist-credentials: false
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      # When npm git-clones this fork, it runs the `prepare` lifecycle
      # script, which calls `yarn compile`. Corepack must be enabled so
      # yarn@4 (per packageManager in package.json) is used instead of the
      # runner's pre-installed yarn 1.22.22.
      - run: corepack enable
      # Install THIS commit of THIS fork into the action repo to verify the
      # action still builds against our changes. Use github.sha (always a
      # 40-char hex commit SHA for both push and pull_request events) rather
      # than parsing GITHUB_REF, because for PR events GITHUB_REF is
      # `refs/pull/<n>/merge` which after stripping yields `<n>/merge` and
      # fails any reasonable allow-list regex. Pass values via `env:` to
      # satisfy zizmor's template-injection rule.
      - run: |
          if [[ ! "$SHA" =~ ^[a-f0-9]{40}$ ]]; then
            echo "Error: Invalid commit SHA: $SHA. Aborting installation."
            exit 1
          fi
          if [[ ! "$REPO" =~ ^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$ ]]; then
            echo "Error: Invalid repo slug: $REPO. Aborting installation."
            exit 1
          fi
          echo "Installing $REPO#$SHA"
          npm install --save "$REPO#$SHA"
        env:
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
      - run: npm run build
