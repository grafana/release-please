on:
  push:
    branches:
      - main
  pull_request:
name: ci
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node }}
      - run: node --version
      - run: corepack enable
      # The first installation step ensures that all of our production
      # dependencies work on the given Node.js version, this helps us find
      # dependencies that don't match our engines field:
      - run: yarn workspaces focus --production
      # Clean up the production install, before installing dev/production:
      - run: rm -rf node_modules
      - run: yarn install --immutable
      - run: yarn test
        env:
          MOCHA_THROW_DEPRECATION: false
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn test
        env:
          MOCHA_THROW_DEPRECATION: false
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn lint
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn docs
      # Pinned to the commit that release v1 (1.11.0) points to, so the
      # action can't be silently re-pointed by retagging upstream.
      # See https://github.com/JustinBeckwith/linkinator-action/releases/tag/v1
      - uses: JustinBeckwith/linkinator-action@3d5ba091319fa7b0ac14703761eebb7d100e6f6d # v1 (1.11.0)
        with:
          paths: docs/
  # NOTE: upstream googleapis/release-please ships a `build-action` job here
  # that installs this repo into `google-github-actions/release-please-action`
  # and runs that action's build. The Grafana fork does NOT use that action
  # (it consumes the release-please CLI directly), and the action repo has
  # been abandoned since 2024-05-13 — its last commit literally added a
  # deprecation warning. The job is removed here as an intentional fork-only
  # deviation. See .agents/skills/sync-upstream-fork/SKILL.md (deviation E).
